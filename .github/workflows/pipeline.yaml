name: CI pipeline

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Node.js
      uses: actions/setup-node@6
      with:
        node-version: 24
        package-manager-cache: false

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm test
