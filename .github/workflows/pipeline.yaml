name: CI pipeline

on:
  push:
    branches: [main]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@4
      with:
        node-version: "20"
        cache: "npm"

    - name: Install Project Dependencies
      run: npm ci

    - name: Run tests
      run: npm test
